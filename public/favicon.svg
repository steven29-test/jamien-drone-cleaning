<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#1a1a1a"/>
  
  <!-- Drone body -->
  <rect x="14" y="14" width="4" height="4" rx="0.5" fill="#ffd700"/>
  
  <!-- Top-left arm and propeller -->
  <line x1="16" y1="14" x2="8" y2="6" stroke="#ffd700" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="8" cy="6" r="1.5" fill="none" stroke="#ffd700" stroke-width="0.5"/>
  
  <!-- Top-right arm and propeller -->
  <line x1="16" y1="14" x2="24" y2="6" stroke="#ffd700" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="24" cy="6" r="1.5" fill="none" stroke="#ffd700" stroke-width="0.5"/>
  
  <!-- Bottom-left arm and propeller -->
  <line x1="16" y1="18" x2="8" y2="26" stroke="#ffd700" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="8" cy="26" r="1.5" fill="none" stroke="#ffd700" stroke-width="0.5"/>
  
  <!-- Bottom-right arm and propeller -->
  <line x1="16" y1="18" x2="24" y2="26" stroke="#ffd700" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="24" cy="26" r="1.5" fill="none" stroke="#ffd700" stroke-width="0.5"/>
</svg>
