<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#1a1a1a"/>
  
  <!-- Yellow gradient background for logo -->
  <defs>
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffed4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Drone body (center) -->
  <rect x="75" y="65" width="50" height="30" rx="5" fill="url(#yellowGradient)"/>
  
  <!-- Drone camera lens -->
  <circle cx="100" cy="80" r="6" fill="#1a1a1a" stroke="#ffed4e" stroke-width="2"/>
  
  <!-- Front left propeller arm -->
  <line x1="75" y1="70" x2="45" y2="45" stroke="#ffb700" stroke-width="3" stroke-linecap="round"/>
  <circle cx="45" cy="45" r="8" fill="url(#goldGradient)" stroke="#ff9500" stroke-width="1"/>
  <!-- Propeller blades front left -->
  <g transform="translate(45, 45)">
    <ellipse cx="0" cy="-12" rx="3" ry="10" fill="#ffed4e" opacity="0.8"/>
    <ellipse cx="12" cy="0" ry="3" rx="10" fill="#ffed4e" opacity="0.8"/>
  </g>
  
  <!-- Front right propeller arm -->
  <line x1="125" y1="70" x2="155" y2="45" stroke="#ffb700" stroke-width="3" stroke-linecap="round"/>
  <circle cx="155" cy="45" r="8" fill="url(#goldGradient)" stroke="#ff9500" stroke-width="1"/>
  <!-- Propeller blades front right -->
  <g transform="translate(155, 45)">
    <ellipse cx="0" cy="-12" rx="3" ry="10" fill="#ffed4e" opacity="0.8"/>
    <ellipse cx="12" cy="0" ry="3" rx="10" fill="#ffed4e" opacity="0.8"/>
  </g>
  
  <!-- Rear left propeller arm -->
  <line x1="75" y1="90" x2="45" y2="125" stroke="#ffb700" stroke-width="3" stroke-linecap="round"/>
  <circle cx="45" cy="125" r="8" fill="url(#goldGradient)" stroke="#ff9500" stroke-width="1"/>
  <!-- Propeller blades rear left -->
  <g transform="translate(45, 125)">
    <ellipse cx="0" cy="-12" rx="3" ry="10" fill="#ffed4e" opacity="0.8"/>
    <ellipse cx="12" cy="0" ry="3" rx="10" fill="#ffed4e" opacity="0.8"/>
  </g>
  
  <!-- Rear right propeller arm -->
  <line x1="125" y1="90" x2="155" y2="125" stroke="#ffb700" stroke-width="3" stroke-linecap="round"/>
  <circle cx="155" cy="125" r="8" fill="url(#goldGradient)" stroke="#ff9500" stroke-width="1"/>
  <!-- Propeller blades rear right -->
  <g transform="translate(155, 125)">
    <ellipse cx="0" cy="-12" rx="3" ry="10" fill="#ffed4e" opacity="0.8"/>
    <ellipse cx="12" cy="0" ry="3" rx="10" fill="#ffed4e" opacity="0.8"/>
  </g>
  
  <!-- Company name text (optional arc) -->
  <path id="textPath" d="M 50,100 A 50,50 0 0,1 150,100" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffd700" letter-spacing="2">
    <textPath href="#textPath" startOffset="50%" text-anchor="middle">
      JAMIEN
    </textPath>
  </text>
  
  <!-- Cleaning water droplet accent at bottom -->
  <path d="M 100,160 Q 95,155 95,150 Q 95,145 100,142 Q 105,145 105,150 Q 105,155 100,160" fill="#ffd700" opacity="0.9"/>
</svg>